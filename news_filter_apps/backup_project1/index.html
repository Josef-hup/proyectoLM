<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Фильтр новостей по датам</title>
</head>
<body>

    <h2>Фильтр новостей</h2>
    
    <label for="countInput">Количество новостей (макс. 5):</label>
    <input type="number" id="countInput" min="1" max="5" value="1">

    <input type="date" id="dateFrom">
    <input type="date" id="dateTo">

    <br><br>

    <label>
        <input type="checkbox" id="sortCheckbox"> Сортировать по дате (Desc/Asc)
    </label>

    <br><br>

    <button onclick="ShowMyNews()">Показать новости</button>

    <hr>

    <div id="content"></div>

    <script src="script.js"></script>
</body>
</html>
